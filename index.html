<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="離職集點卡 — 蒐集每一個想離職的瞬間，集滿就自由！" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com; img-src 'self' https://lh3.googleusercontent.com data: blob:; font-src https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com wss://*.firebaseio.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; frame-src https://*.firebaseapp.com;" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>離職集點卡</title>
    <link rel="apple-touch-icon" href="/byebyecard/apple-touch-icon.png" />
    <link rel="manifest" href="/byebyecard/manifest.json" />
    <meta name="theme-color" content="#8B0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="離職集點卡" />
  </head>
  <body>
    <!-- 防主題閃爍：React 載入前先套用 CSS 變數 -->
    <script>
      (function () {
        var themes = {
          rage:    { '--t-bg':'#0d0000','--t-card':'#1a0000','--t-slot':'#110000','--t-filled':'#2a0000','--t-border':'#8B0000','--t-accent':'#FF3333','--t-muted':'#CC4444' },
          warm:    { '--t-bg':'#fff8f4','--t-card':'#ffffff','--t-slot':'#fef0e6','--t-filled':'#fde8d8','--t-border':'#f4a261','--t-accent':'#e76f51','--t-muted':'#f4a261' },
          minimal: { '--t-bg':'#f5f5f5','--t-card':'#ffffff','--t-slot':'#eeeeee','--t-filled':'#e0e0e0','--t-border':'#bdbdbd','--t-accent':'#424242','--t-muted':'#757575' },
          night:   { '--t-bg':'#0a0e1a','--t-card':'#111827','--t-slot':'#0d1424','--t-filled':'#1e2d4a','--t-border':'#2563eb','--t-accent':'#60a5fa','--t-muted':'#93c5fd' },
        }
        var id = localStorage.getItem('theme') || 'minimal'
        var vars = themes[id] || themes.rage
        var root = document.documentElement
        Object.keys(vars).forEach(function (k) { root.style.setProperty(k, vars[k]) })
        root.setAttribute('data-theme', id)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
